<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eternal Flames - Our Spicy Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { 
        font-family: 'Segoe UI', sans-serif; 
        background: linear-gradient(135deg, #1a0033, #330033); 
        color: white; 
        text-align: center; 
        margin: 0; 
        padding: 20px; 
    }
    h1 { color: #ff3366; margin-bottom: 10px; }
    button { 
        padding: 16px 32px; 
        margin: 12px; 
        font-size: 18px; 
        background: #ff3366; 
        color: white; 
        border: none; 
        border-radius: 50px; 
        cursor: pointer; 
    }
    button:hover { background: #ff6699; }
    .small-btn { padding: 12px 24px; font-size: 16px; }
    #challenge { 
        margin: 30px auto; 
        padding: 30px; 
        background: rgba(255,255,255,0.1); 
        border-radius: 20px; 
        max-width: 650px; 
        min-height: 180px; 
        line-height: 1.6;
    }
    .score { font-size: 22px; margin: 15px 0; }
</style>
</head>
<body>
    <h1>🔥 Eternal Flames 🔥</h1>
    <p style="font-size:18px; margin:20px;">Our Private Spicy Game</p>
    
    <div class="score">You: <span id="scoreYou">0</span> — Partner: <span id="scorePartner">0</span></div>

    <button onclick="rollDice()">🎲 Roll Dice</button>
    <button onclick="newDilemma()">❓ Spicy Dilemma</button>
    <button onclick="sensoryRound()">🖤 Sensory Round</button>

    <div id="challenge">Click any button to start playing...</div>

<script>
// Scores
let scoreYou = 0;
let scorePartner = 0;

function updateScores() {
    document.getElementById('scoreYou').textContent = scoreYou;
    document.getElementById('scorePartner').textContent = scorePartner;
}

function rollDice() {
    const roll = Math.floor(Math.random() * 6) + 1;
    const challenges = [
        "Kiss and lick your partner's neck slowly for 45 seconds",
        "Strip one clothing item very seductively while maintaining eye contact",
        "Give a slow sensual massage on chest/thighs for 90 seconds",
        "Whisper 3 naughty things you want to do to them right now",
        "Suck on their fingers or toes while looking into their eyes",
        "Let your partner spank you 8 times (playfully)",
        "Perform a slow body tease (dance or touch yourself)",
        "French kiss for one full minute"
    ];
    
    const challenge = challenges[Math.floor(Math.random() * challenges.length)];
    
    document.getElementById('challenge').innerHTML = `
        <h2>🎲 You rolled ${roll}!</h2>
        <p><strong>${challenge}</strong></p>
    `;
}

function newDilemma() {
    const dilemmas = [
        "Would you rather give oral for 10 minutes or receive for 5 minutes?",
        "Would you rather tie me up or be tied up this round?",
        "Would you rather do it blindfolded or in front of a mirror?",
        "Would you rather be spanked or do the spanking?",
        "Would you rather use ice on body or hot wax (safe temperature)?",
        "Would you rather dominate me completely or submit fully?"
    ];
    
    const q = dilemmas[Math.floor(Math.random() * dilemmas.length)];
    
    document.getElementById('challenge').innerHTML = `
        <h2>❓ Spicy Dilemma</h2>
        <p><strong>${q}</strong></p>
        <p>Who wins this round?</p>
        <button class="small-btn" onclick="declareWinner('You')">You Win</button>
        <button class="small-btn" onclick="declareWinner('Partner')">Partner Wins</button>
    `;
}

function declareWinner(winner) {
    if (winner === 'You') scoreYou++;
    else scorePartner++;
    
    updateScores();
    
    const rewards = [
        "Winner gets 4 minutes of oral pleasure of their choice",
        "Loser must strip completely right now",
        "Winner chooses any position for next 5-7 minutes",
        "Blindfold the loser and tease them for 4 minutes",
        "Winner gets a full body sensual massage",
        "Loser must obey 3 commands from winner"
    ];
    
    const reward = rewards[Math.floor(Math.random() * rewards.length)];
    
    document.getElementById('challenge').innerHTML = `
        <h2>🏆 ${winner} Wins!</h2>
        <p><strong>${reward}</strong></p>
        <p>Enjoy the moment 🔥</p>
    `;
}

function sensoryRound() {
    document.getElementById('challenge').innerHTML = `
        <h2>🖤 Sensory Round</h2>
        <p><strong>Blindfold your partner for 3 to 5 minutes.</strong></p>
        <p>Use your fingers, tongue, breath, ice, or soft fabric to tease them slowly.<br>
        Focus on neck, ears, nipples, inner thighs... make them crave more.</p>
    `;
}

// Initialize
updateScores();
</script>
</body>
</html>
